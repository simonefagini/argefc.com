<!DOCTYPE html>
<html lang="en">
<head>

  <meta
    name="viewport"

  >

  <meta
    name="theme-color"
    content="#195c33"

  <title>ARGE FC</title>

    html {
      background-color: #195c33;
    }

    body {

    }
  </style>

  <link
    rel="preload"
    as="image"
    href="https://raw.githubusercontent.com/simonefagini/argefc.com/refs/heads/main/_resources/LOG_TEMP.png"

</head>

<body>

  <main class="hero">

    <h1 class="sr-only">ARGE FC</h1>

    <a
      class="entry-link"
      id="intro-trigger"
      href="../home/home.html"
      aria-label="Enter ARGE FC"
      aria-disabled="true"
      tabindex="-1"
    >

      <div class="logo">
        <img
          class="logo-image"
          src="https://raw.githubusercontent.com/simonefagini/argefc.com/refs/heads/main/_resources/LOG_TEMP.png"
          alt=""
          fetchpriority="high"
        >

      <div class="sticker">
        ASSOCIATION OF<br>

    </a>
